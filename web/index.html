<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- This meta tag makes the map fill mobile screens correctly (no zooming the
       whole page). 'user-scalable=no' lets MapLibre handle pinch-zoom itself. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Interactive Wildlife Map</title>

  <!-- MapLibre GL: the map library. We load its CSS (for controls/popups) and
       its JS from a CDN. Pinning a major version (^4) avoids surprise upgrades. -->
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

  <link href="style.css" rel="stylesheet" />
</head>
<body>
  <!-- MapLibre draws the map *into* this empty div, by its id. -->
  <div id="map"></div>

  <!-- A small floating panel to show what's loaded. -->
  <div id="hud">Loading wildlife…</div>

  <!-- Group filter. The checkboxes are generated by app.js from GROUP_ICONS. -->
  <div id="filter"></div>

  <!-- defer = run this after the HTML is parsed, so #map already exists. -->
  <script src="app.js" defer></script>
</body>
</html>
